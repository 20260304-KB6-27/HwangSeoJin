<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>회원가입</legend>
        <table>
          <tr>
            <td><label for="userid">사용자 ID</label></td>
            <td><input id="userid" name="userid" type="text" /></td>
          </tr>
          <tr>
            <td><label for="password">비밀번호</label></td>
            <td><input id="password" name="password" type="text" /></td>
          </tr>
          <tr>
            <td><label for="password confirm">비밀번호 확인</label></td>
            <td>
              <input
                id="password confirm"
                name="password confirm"
                type="text"
              />
            </td>
          </tr>
          <tr>
            <td><label for="name">이름</label></td>
            <td><input id="name" name="name" type="text" /></td>
          </tr>
          <tr>
            <td>성별</td>
            <td>
              <input id="man" type="radio" name="gender" value="m" />
              <label for="man">남</label>
              <input id="woman" type="radio" name="gender" value="f" />
              <label for="woman">여</label>
            </td>
          </tr>
          <tr>
            <td>취미</td>
            <td>
              <input id="soccer" type="checkbox" name="hobby" value="soccer" />
              <label for="soccer">축구</label>
              <input id="base" type="checkbox" name="hobby" value="base" />
              <label for="base">야구</label>
              <input id="volley" type="checkbox" name="hobby" value="volley" />
              <label for="volley">배구</label>
              <input id="basket" type="checkbox" name="hobby" value="basket" />
              <label for="basket">농구</label>
            </td>
          </tr>
          <tr>
            <td><label for="email">email</label></td>
            <td><input id="email" name="email" type="text" /></td>
          </tr>
          <tr>
            <td>
              <label for="role">역할</label>
            </td>
            <td>
              <select>
                <option>ADMIN</option>
                <option>관리자</option>
                <option>일반회원</option>
              </select>
            </td>
          </tr>
        </table>
        <input type="submit" value="확인" />
        <input type="submit" value="다시쓰기" />
      </fieldset>
    </form>
  </body>
</html>
