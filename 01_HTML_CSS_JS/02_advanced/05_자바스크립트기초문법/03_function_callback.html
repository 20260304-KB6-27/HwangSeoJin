<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      function call(count, callback) {
        for (let i = 0; i < count; i++) {
          callback();
        }
      }

      let myFunc = function () {
        alert('함수 호출');
      };

      call(5, myFunc);
    </script>
  </head>

  <body></body>
</html>
